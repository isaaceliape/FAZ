name: Publicar no npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_VERSION: '24'

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4.2.0

      - name: Configurar Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verificar integridade do pacote
        run: |
          cd bin
          npm install
          npm pack --dry-run > /tmp/pack_output.txt
          if grep -q "total files: 0" /tmp/pack_output.txt; then
            echo "❌ Erro: nenhum arquivo encontrado no pacote"
            exit 1
          fi
          echo "✓ Pacote verificado com sucesso"
          cat /tmp/pack_output.txt

      - name: Publicar no npm
        run: |
          cd bin
          npm install
          npm config set registry https://registry.npmjs.org/
          npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Criar release no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          NOTES=$(cat <<'EOF'
          Publicado em npm: https://www.npmjs.com/package/fase-ai/v${{ github.ref_name }}

          Instale com:
          ```bash
          npx fase-ai@${{ github.ref_name }}
          ```
          EOF
          )
          gh release create "${{ github.ref }}" --title "Release ${{ github.ref_name }}" --notes "$NOTES" 2>/dev/null || gh release edit "${{ github.ref }}" --title "Release ${{ github.ref_name }}" --notes "$NOTES"
