name: Track Adoption Metrics

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * MON'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-metrics:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run metrics collection
        run: |
          bash .metrics/track-metrics.sh

      - name: Commit metrics
        run: |
          git config user.name "Metrics Bot"
          git config user.email "metrics-bot@fase-ai.dev"

          if git diff --quiet .metrics/metrics.csv; then
            echo "No changes to metrics"
          else
            git add .metrics/metrics.csv
            git commit -m "chore: update adoption metrics - $(date +%Y-%m-%d)"
            git push
          fi
