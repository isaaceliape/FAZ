name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'www/**'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install marked

      - name: Build documentation
        run: node build-docs.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create deployment directory
        run: |
          mkdir -p deploy
          # Copy landing page and assets
          cp www/index.html deploy/
          cp -r www/*.png deploy/ 2>/dev/null || true
          cp -r www/fonts deploy/ 2>/dev/null || true
          # Copy generated HTML docs to /docs subdirectory
          mkdir -p deploy/docs
          cp -r docs/*.html deploy/docs/
          cp -r docs/*.md deploy/docs/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
