name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'www/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Starlight Documentation
        run: |
          cd www/docs
          npm install
          npm run build
          # Copy built docs to www/docs-build for deployment
          mkdir -p ../docs-build
          cp -r dist/* ../docs-build/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create deployment directory
        run: |
          mkdir -p deploy
          # Copy landing page
          cp www/index.html deploy/
          # Copy other www assets
          cp -r www/*.png deploy/ 2>/dev/null || true
          cp -r www/fonts deploy/ 2>/dev/null || true
          # Copy built docs to /docs subdirectory
          mkdir -p deploy/docs
          cp -r www/docs-build/* deploy/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
